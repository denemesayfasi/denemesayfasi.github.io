<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoumadinTakip</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1A73E8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CoumadinTakip">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/822/822143.png">
    <link rel="manifest" href="manifest.json">
    
    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React ve Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        :root {
            --primary: #1A73E8;
            --primary-dark: #0D47A1;
            --bg: #F4F7FA;
            --card: #FFFFFF;
            --text: #1E293B;
            --accent: #3B82F6;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .custom-shadow {
            box-shadow: 0 10px 25px -5px rgba(26, 115, 232, 0.1);
        }

        .rounded-4xl {
            border-radius: 32px;
        }

        /* Hide scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input[type="time"]::-webkit-calendar-picker-indicator {
            opacity: 0.5;
        }

        .blue-gradient {
            background: linear-gradient(135deg, #1A73E8 0%, #0D47A1 100%);
        }

        .nav-blur {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const DAYS = ['Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi', 'Pazar'];

        function App() {
            const [view, setView] = useState('main');
            const [schedule, setSchedule] = useState(() => {
                const saved = localStorage.getItem('c_sch');
                return saved ? JSON.parse(saved) : DAYS.reduce((acc, d) => ({ ...acc, [d]: 'Tam' }), {});
            });
            const [alarmTime, setAlarmTime] = useState(() => localStorage.getItem('c_alm') || '21:00');
            const [inrHistory, setInrHistory] = useState(() => {
                const saved = localStorage.getItem('c_inr');
                return saved ? JSON.parse(saved) : [];
            });
            const [isFirstTime, setIsFirstTime] = useState(() => !localStorage.getItem('c_setup'));

            // INR Form State
            const [newValue, setNewValue] = useState('');
            const [newNote, setNewNote] = useState('');
            const [newDate, setNewDate] = useState(new Date().toISOString().split('T')[0]);

            useEffect(() => {
                localStorage.setItem('c_sch', JSON.stringify(schedule));
                localStorage.setItem('c_alm', alarmTime);
                localStorage.setItem('c_inr', JSON.stringify(inrHistory));
                if (!isFirstTime) localStorage.setItem('c_setup', 'true');

                // Send alarm time to Service Worker
                if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
                    navigator.serviceWorker.controller.postMessage({
                        type: 'SET_ALARM',
                        time: alarmTime
                    });
                }
            }, [schedule, alarmTime, inrHistory, isFirstTime]);

            // Notification Check Logic
            useEffect(() => {
                const checkAlarm = async () => {
                    const now = new Date();
                    const currentStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                    
                    if (currentStr === alarmTime && Notification.permission === 'granted') {
                        const lastNotified = localStorage.getItem('last_notified');
                        if (lastNotified !== currentStr) {
                            const title = 'Coumadin Hatırlatıcı';
                            const options = {
                                body: 'İlacını içme vaktin geldi!',
                                icon: 'https://cdn-icons-png.flaticon.com/512/822/822143.png',
                                badge: 'https://cdn-icons-png.flaticon.com/512/822/822143.png',
                                vibrate: [200, 100, 200],
                                tag: 'coumadin-alarm',
                                renotify: true
                            };

                            if ('serviceWorker' in navigator) {
                                const registration = await navigator.serviceWorker.ready;
                                registration.showNotification(title, options);
                            } else {
                                new Notification(title, options);
                            }
                            
                            localStorage.setItem('last_notified', currentStr);
                        }
                    }
                };

                const interval = setInterval(checkAlarm, 10000); // Check every 10 seconds for better precision
                return () => clearInterval(interval);
            }, [alarmTime]);

            const requestNotificationPermission = (callback) => {
                if (!('Notification' in window)) {
                    alert('Bu tarayıcı bildirimleri desteklemiyor. Eğer iPhone kullanıyorsanız, lütfen uygulamayı "Ana Ekrana Ekle" yaparak kullanın.');
                    if (callback) callback();
                    return;
                }
                
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        console.log('Bildirim izni alındı.');
                    } else if (permission === 'denied') {
                        alert('Bildirim izni reddedildi. Ayarlardan izin vermeniz gerekiyor.');
                    }
                    if (callback) callback();
                });
            };

            const today = new Intl.DateTimeFormat('tr-TR', { weekday: 'long' }).format(new Date());

            // Setup View
            if (isFirstTime) {
                return (
                    <div className="min-h-screen p-8 max-w-md mx-auto flex flex-col bg-white">
                        <div className="mb-10">
                            <h1 className="text-3xl font-bold text-blue-900">Kurulum</h1>
                            <p className="text-slate-400 mt-2">Haftalık doz planınızı ayarlayarak başlayın.</p>
                        </div>
                        
                        <div className="bg-slate-50 rounded-4xl p-6 mb-8 flex-1 overflow-y-auto no-scrollbar border border-slate-100">
                            <h3 className="font-bold text-lg mb-6 text-slate-700">Haftalık Plan</h3>
                            {DAYS.map(day => (
                                <div key={day} className="mb-6 last:mb-0">
                                    <div className="text-sm font-semibold text-slate-500 mb-3">{day}</div>
                                    <div className="grid grid-cols-3 gap-2">
                                        {['Tam', 'Yarım', 'İçilmeyecek'].map(type => (
                                            <button 
                                                key={type}
                                                onClick={() => setSchedule(p => ({...p, [day]: type}))}
                                                className={`py-3 text-[11px] font-bold rounded-2xl border transition-all duration-300 ${schedule[day] === type ? 'bg-blue-600 text-white border-blue-600 shadow-lg' : 'bg-white text-slate-400 border-slate-200'}`}
                                            >
                                                {type}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                        
                        <div className="bg-slate-50 rounded-3xl p-6 mb-8 flex justify-between items-center border border-slate-100">
                            <div className="flex items-center gap-3">
                                <div className="bg-blue-100 p-2 rounded-xl text-blue-600 text-xl">⏰</div>
                                <span className="font-bold text-slate-700">Hatırlatıcı</span>
                            </div>
                            <input type="time" value={alarmTime} onChange={e => setAlarmTime(e.target.value)} className="bg-white p-2 rounded-xl outline-none font-bold text-slate-600 border border-slate-200" />
                        </div>

                        <button 
                            onClick={() => {
                                requestNotificationPermission(() => {
                                    setIsFirstTime(false);
                                });
                            }} 
                            className="w-full bg-blue-600 text-white py-5 rounded-3xl font-bold shadow-xl shadow-blue-100 active:scale-95 transition-transform"
                        >
                            Başlat
                        </button>
                        
                        <div className="mt-8 text-center">
                            <p className="text-[10px] font-bold text-slate-300 uppercase tracking-[0.2em]">Coding by E.TÜRK</p>
                            <p className="text-[9px] font-medium text-slate-400 mt-1 italic">Bu proğram Nuran TÜRK için yapılmıştır..</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-32 max-w-md mx-auto px-6 pt-8">
                    {/* Header */}
                    <div className="mb-8">
                        <h1 className="text-3xl font-bold text-blue-900 tracking-tight">CoumadinTakip</h1>
                        <p className="text-slate-400 text-sm font-medium">Haftalık Doz ve INR İzleme</p>
                    </div>

                    {view === 'main' && (
                        <div className="space-y-8">
                            {/* Today Card */}
                            <div className="blue-gradient rounded-[40px] p-8 text-white relative overflow-hidden custom-shadow">
                                <div className="relative z-10">
                                    <div className="flex justify-between items-start mb-6">
                                        <div>
                                            <div className="text-xs opacity-80 uppercase tracking-widest font-bold mb-1">Bugün: {today}</div>
                                        </div>
                                        <div className="bg-white/20 p-3 rounded-2xl backdrop-blur-md">📅</div>
                                    </div>
                                    <div className="flex items-end justify-between">
                                        <div>
                                            <div className="text-5xl font-black tracking-tighter">{schedule[today]}</div>
                                            <div className="text-sm opacity-80 font-medium mt-1 uppercase tracking-wider">Doz Alınacak</div>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-[10px] opacity-70 font-bold tracking-widest">SAAT</div>
                                            <div className="text-2xl font-bold">{alarmTime}</div>
                                        </div>
                                    </div>
                                </div>
                                <div className="absolute -right-10 -top-10 w-48 h-48 bg-white/10 rounded-full blur-3xl"></div>
                                <div className="absolute -left-10 -bottom-10 w-32 h-32 bg-blue-400/20 rounded-full blur-2xl"></div>
                            </div>

                            {/* Weekly Plan Section */}
                            <div>
                                <div className="flex justify-between items-center mb-5 px-2">
                                    <h3 className="font-bold text-lg text-blue-900">Haftalık Plan</h3>
                                    <span className="text-blue-600 text-xs font-bold uppercase tracking-wider">Tümü</span>
                                </div>
                                <div className="space-y-4">
                                    {DAYS.map(day => (
                                        <div key={day} className={`bg-white p-5 rounded-3xl flex justify-between items-center custom-shadow border-2 transition-all ${day === today ? 'border-blue-500 ring-4 ring-blue-50' : 'border-transparent'}`}>
                                            <div className="flex items-center gap-4">
                                                <div className={`w-12 h-12 rounded-2xl flex items-center justify-center text-xl relative ${day === today ? 'bg-blue-600 text-white shadow-lg shadow-blue-100' : 'bg-slate-50'}`}>
                                                    {schedule[day] === 'Tam' ? '💊' : 
                                                     schedule[day] === 'Yarım' ? (
                                                        <div className="relative flex items-center justify-center">
                                                            <span className={day === today ? 'opacity-100' : 'opacity-80'}>💊</span>
                                                            <span className={`absolute -bottom-2 -right-2 text-[9px] px-1 rounded-full border leading-none py-0.5 font-bold ${day === today ? 'bg-white text-blue-600 border-blue-600' : 'bg-blue-500 text-white border-white'}`}>½</span>
                                                        </div>
                                                     ) : <span className={day === today ? 'text-white' : 'text-slate-200'}>🗓️</span>}
                                                </div>
                                                <div>
                                                    <div className={`font-bold ${day === today ? 'text-blue-900' : 'text-slate-600'}`}>{day}</div>
                                                    <div className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Planlanan Doz</div>
                                                </div>
                                            </div>
                                            <div className={`px-4 py-2 rounded-2xl text-xs font-bold ${
                                                schedule[day] === 'Tam' ? 'bg-blue-50 text-blue-600' :
                                                schedule[day] === 'Yarım' ? 'bg-sky-50 text-sky-600' :
                                                'bg-slate-50 text-slate-400'
                                            }`}>
                                                {schedule[day]}
                                            </div>
                                        </div>
                                    ))}

                                    {/* Last INR Card below Sunday */}
                                    {inrHistory.length > 0 && (
                                        <div className="mt-6 bg-slate-900 rounded-[32px] p-6 text-white flex justify-between items-center shadow-xl border border-white/5">
                                            <div>
                                                <p className="text-blue-400 text-[10px] uppercase tracking-widest font-bold">Son INR Ölçümü</p>
                                                <p className="text-3xl font-black mt-1 tracking-tight">{inrHistory[0].value}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-slate-400 text-xs font-medium">{inrHistory[0].date.split('-').reverse().join('.')}</p>
                                                <p className={`text-[10px] font-bold uppercase tracking-wider mt-1 ${inrHistory[0].value >= 2 && inrHistory[0].value <= 3 ? 'text-emerald-400' : 'text-orange-400'}`}>
                                                    {inrHistory[0].value >= 2 && inrHistory[0].value <= 3 ? 'Hedef Aralıkta' : 'Aralık Dışı'}
                                                </p>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'inr' && (
                        <div className="space-y-8">
                            <h2 className="text-2xl font-bold text-blue-900">INR Takibi</h2>
                            
                            <div className="bg-white rounded-[40px] p-8 space-y-6 custom-shadow border border-blue-50">
                                <h3 className="font-bold text-slate-700 flex items-center gap-2">
                                    <span className="text-blue-500">➕</span> Yeni Kayıt
                                </h3>
                                <div className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-widest">Değer</label>
                                            <input type="number" step="0.1" placeholder="2.5" value={newValue} onChange={e => setNewValue(e.target.value)} className="w-full bg-slate-50 p-4 rounded-2xl outline-none border-2 border-transparent focus:border-blue-500 transition-all font-bold text-blue-900" />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-widest">Tarih</label>
                                            <input type="date" value={newDate} onChange={e => setNewDate(e.target.value)} className="w-full bg-slate-50 p-4 rounded-2xl outline-none border-2 border-transparent focus:border-blue-500 transition-all font-bold text-blue-900" />
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-widest">Not (Opsiyonel)</label>
                                        <textarea 
                                            placeholder="Örn: Doz değişikliği yapıldı..." 
                                            value={newNote} 
                                            onChange={e => setNewNote(e.target.value)} 
                                            className="w-full bg-slate-50 p-4 rounded-2xl outline-none border-2 border-transparent focus:border-blue-500 transition-all font-medium text-slate-600 min-h-[80px] resize-none"
                                        />
                                    </div>
                                </div>
                                <button onClick={() => {
                                    if(!newValue) return;
                                    setInrHistory([{id: Date.now(), date: newDate, value: newValue, note: newNote}, ...inrHistory]);
                                    setNewValue('');
                                    setNewNote('');
                                }} className="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-100 active:scale-95 transition-transform">Kaydet</button>
                            </div>

                            <div className="space-y-4">
                                <h3 className="font-bold text-blue-900 px-2">Geçmiş Ölçümler</h3>
                                {inrHistory.map(item => (
                                    <div key={item.id} className="bg-white p-5 rounded-3xl custom-shadow border border-slate-50">
                                        <div className="flex justify-between items-start mb-3">
                                            <div className="flex items-center gap-4">
                                                <div className={`w-14 h-14 rounded-2xl flex items-center justify-center font-bold text-xl ${item.value >= 2 && item.value <= 3 ? 'bg-emerald-50 text-emerald-600' : 'bg-orange-50 text-orange-600'}`}>
                                                    {item.value}
                                                </div>
                                                <div>
                                                    <div className="font-bold text-blue-900">{item.date.split('-').reverse().join('.')}</div>
                                                    <div className="text-[10px] text-slate-400 font-bold tracking-widest uppercase">HEDEF: 2.0 - 3.0</div>
                                                </div>
                                            </div>
                                            <button onClick={() => setInrHistory(inrHistory.filter(i => i.id !== item.id))} className="w-10 h-10 flex items-center justify-center text-slate-200 hover:text-red-400 transition-colors">🗑️</button>
                                        </div>
                                        {item.note && (
                                            <div className="mt-2 p-3 bg-slate-50 rounded-xl text-xs text-slate-500 italic border-l-4 border-blue-200">
                                                "{item.note}"
                                            </div>
                                        )}
                                    </div>
                                ))}
                                {inrHistory.length === 0 && (
                                    <div className="text-center py-16 text-slate-300 italic">Henüz bir ölçüm kaydı bulunmuyor.</div>
                                )}
                            </div>
                        </div>
                    )}

                    {view === 'settings' && (
                        <div className="space-y-8">
                            <h2 className="text-2xl font-bold text-blue-900">Ayarlar</h2>

                            <div className="bg-white rounded-[40px] overflow-hidden custom-shadow border border-slate-50">
                                <div className="p-6 bg-slate-50 border-b font-bold text-blue-900 flex items-center gap-3">
                                    <span className="text-xl">🗓️</span> Doz Planını Güncelle
                                </div>
                                <div className="p-6">
                                    {DAYS.map(day => (
                                        <div key={day} className="mb-6 last:mb-0">
                                            <div className="text-xs font-bold text-slate-400 mb-3 ml-1 uppercase tracking-widest">{day}</div>
                                            <div className="grid grid-cols-3 gap-2">
                                                {['Tam', 'Yarım', 'İçilmeyecek'].map(type => (
                                                    <button 
                                                        key={type} 
                                                        onClick={() => setSchedule(p => ({...p, [day]: type}))} 
                                                        className={`py-3 text-[10px] font-bold rounded-2xl border transition-all duration-300 ${schedule[day] === type ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-slate-50 text-slate-400 border-transparent'}`}
                                                    >
                                                        {type}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="bg-white rounded-3xl p-6 flex justify-between items-center custom-shadow border border-slate-50">
                                <div className="flex items-center gap-3">
                                    <span className="text-xl">⏰</span>
                                    <span className="font-bold text-blue-900">Hatırlatıcı Saati</span>
                                </div>
                                <input type="time" value={alarmTime} onChange={e => setAlarmTime(e.target.value)} className="bg-slate-50 p-2 rounded-xl outline-none font-bold text-blue-600 border border-slate-100" />
                            </div>

                            <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100 mb-4">
                                <div className="flex justify-between items-center">
                                    <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">Bildirim Durumu</span>
                                    <span className={`text-[10px] font-bold px-2 py-1 rounded-lg ${
                                        Notification.permission === 'granted' ? 'bg-emerald-100 text-emerald-600' : 
                                        Notification.permission === 'denied' ? 'bg-red-100 text-red-600' : 'bg-orange-100 text-orange-600'
                                    }`}>
                                        {Notification.permission === 'granted' ? 'AKTİF' : 
                                         Notification.permission === 'denied' ? 'ENGELENDİ' : 'İZİN BEKLENİYOR'}
                                    </span>
                                </div>
                                {Notification.permission !== 'granted' && (
                                    <p className="text-[9px] text-slate-400 mt-2 leading-tight">
                                        Bildirim alabilmek için yukarıdaki butona basıp izin vermeniz gerekmektedir.
                                    </p>
                                )}
                            </div>

                            <div className="space-y-3">
                                <button 
                                    onClick={() => {
                                        requestNotificationPermission(() => {
                                            if (Notification.permission === 'granted') {
                                                alert('Bildirimler başarıyla etkinleştirildi!');
                                            } else {
                                                alert('Bildirim izni reddedildi. Lütfen tarayıcı ayarlarından izin verin.');
                                            }
                                        });
                                    }}
                                    className="w-full bg-emerald-50 text-emerald-600 font-bold py-4 rounded-2xl border border-emerald-100 flex items-center justify-center gap-2 active:scale-95 transition-transform"
                                >
                                    <span>🔔</span> Bildirimleri Etkinleştir
                                </button>

                                {Notification.permission === 'granted' && (
                                    <button 
                                        onClick={async () => {
                                            try {
                                                const title = 'Test Bildirimi';
                                                const options = {
                                                    body: 'Uygulama bildirimleri başarıyla çalışıyor!',
                                                    icon: 'https://cdn-icons-png.flaticon.com/512/822/822143.png',
                                                    badge: 'https://cdn-icons-png.flaticon.com/512/822/822143.png',
                                                    vibrate: [200, 100, 200]
                                                };
                                                
                                                if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
                                                    const reg = await navigator.serviceWorker.ready;
                                                    await reg.showNotification(title, options);
                                                } else {
                                                    new Notification(title, options);
                                                }
                                            } catch (err) {
                                                console.error('Bildirim hatası:', err);
                                                alert('Bildirim gönderilemedi: ' + err.message);
                                            }
                                        }}
                                        className="w-full bg-blue-50 text-blue-600 font-bold py-3 rounded-2xl border border-blue-100 text-xs active:scale-95 transition-transform"
                                    >
                                        Deneme Bildirimi Gönder
                                    </button>
                                )}
                            </div>

                            <div className="p-6 bg-blue-50 rounded-[32px] border border-blue-100 flex items-start gap-4">
                                <span className="text-blue-500 text-2xl">ℹ️</span>
                                <p className="text-[11px] text-blue-800 leading-relaxed font-medium">
                                    <strong>Bilgi:</strong> Bu uygulama verilerinizi sadece bu cihazda saklar. Doz değişiklikleri için doktorunuza danışınız.
                                </p>
                            </div>

                            <button 
                                onClick={() => {
                                    if (confirm('Tüm verileri sıfırlamak istediğinize emin misiniz?')) {
                                        localStorage.clear();
                                        window.location.reload();
                                    }
                                }}
                                className="w-full text-red-400 font-bold py-4 text-xs tracking-widest uppercase hover:bg-red-50 rounded-2xl transition-colors"
                            >
                                🗑️ Tüm Verileri Sıfırla
                            </button>
                        </div>
                    )}

                    {/* Footer Credits */}
                    <div className="mt-12 mb-8 text-center">
                        <p className="text-[10px] font-bold text-slate-300 uppercase tracking-[0.2em]">Coding by E.TÜRK</p>
                    </div>

                    {/* PWA Install Prompt */}
                    <InstallPrompt />

                    {/* Bottom Nav Bar - FIXED AT BOTTOM */}
                    <div className="fixed bottom-0 left-0 right-0 flex justify-center p-6 z-50 pointer-events-none">
                        <div className="nav-blur h-20 w-full max-w-md flex justify-around items-center custom-shadow rounded-[32px] border border-white/50 pointer-events-auto">
                            <button onClick={() => setView('main')} className={`flex flex-col items-center gap-1 transition-all duration-300 ${view === 'main' ? 'text-blue-600 scale-110' : 'text-slate-300'}`}>
                                <span className="text-2xl">🏠</span>
                                <span className="text-[8px] font-black tracking-widest">ANA SAYFA</span>
                            </button>
                            <button onClick={() => setView('inr')} className={`flex flex-col items-center gap-1 transition-all duration-300 ${view === 'inr' ? 'text-blue-600 scale-110' : 'text-slate-300'}`}>
                                <span className="text-2xl">📊</span>
                                <span className="text-[8px] font-black tracking-widest">INR</span>
                            </button>
                            <button onClick={() => setView('settings')} className={`flex flex-col items-center gap-1 transition-all duration-300 ${view === 'settings' ? 'text-blue-600 scale-110' : 'text-slate-300'}`}>
                                <span className="text-2xl">⚙️</span>
                                <span className="text-[8px] font-black tracking-widest">AYARLAR</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // PWA Install Component
        function InstallPrompt() {
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [show, setShow] = useState(false);

            useEffect(() => {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                    setShow(true);
                });
            }, []);

            const handleInstall = async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    setDeferredPrompt(null);
                    setShow(false);
                }
            };

            if (!show) return null;

            return (
                <div className="fixed top-6 left-6 right-6 z-[100] bg-blue-600 text-white p-5 rounded-3xl shadow-2xl flex items-center justify-between animate-bounce">
                    <div className="flex items-center gap-3">
                        <span className="text-2xl">📱</span>
                        <div>
                            <div className="font-bold text-sm">Uygulamayı Yükle</div>
                            <div className="text-[10px] opacity-80">Hızlı erişim için ana ekrana ekle</div>
                        </div>
                    </div>
                    <div className="flex gap-2">
                        <button onClick={() => setShow(false)} className="px-3 py-2 text-xs font-bold opacity-60">Kapat</button>
                        <button onClick={handleInstall} className="bg-white text-blue-600 px-4 py-2 rounded-xl text-xs font-bold">Yükle</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => {
                        console.log('SW registered!', reg);
                        // Check for updates
                        reg.onupdatefound = () => {
                            const installingWorker = reg.installing;
                            installingWorker.onstatechange = () => {
                                if (installingWorker.state === 'installed') {
                                    if (navigator.serviceWorker.controller) {
                                        console.log('Yeni sürüm mevcut, lütfen sayfayı yenileyin.');
                                    }
                                }
                            };
                        };
                    })
                    .catch(err => console.log('SW registration failed:', err));
            });
            
            // Ensure the service worker takes control immediately
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                console.log('Service Worker kontrolü ele aldı.');
                // Send current alarm time to new controller
                const savedAlarm = localStorage.getItem('c_alm') || '21:00';
                if (navigator.serviceWorker.controller) {
                    navigator.serviceWorker.controller.postMessage({
                        type: 'SET_ALARM',
                        time: savedAlarm
                    });
                }
            });
        }
    </script>
</body>
</html>
