(Değişik birinci fıkra:RG-21/2/2026-33175) Dağıtım veya ölçüm sistemine ya da tesisata herhangi bir şekilde müdahale edilerek tüketimin doğru tespit edilmesini engellemek suretiyle, tüketimin eksik veya hatalı ölçülerek ya da hiç ölçülmeden veya yasal şekilde tesis edilmiş sayaçtan geçirilmeden mevzuata aykırı bir şekilde tüketilmesi, kaçak doğal gaz kullanımı olarak kabul edilir. Kurul tarafından belirlenecek kriterlere uygun tüketici gruplarına, ilgili dağıtım şirketi tarafından uzaktan okuma ve akıllı ölçüm sistemleri ve/veya sayaç ve regülatörleri müdahalelerden koruyucu malzemeler kullanılabilir. Sayaçta veya regülatörde tesis edilmiş olan ve ölçüm ya da basınç ayarlama sistemine müdahaleyi engelleyen malzemeler ile uzaktan okuma ve akıllı ölçüm sistemlerine yapılan müdahaleler kaçak doğal gaz kullanımı sayılır. Kaçak doğal gaz kullanımının tespit edilmesinde, dağıtım şirketinin tespitini doğru bulgu ve belgelere dayandırması ve tüketici haklarının ihlal edilmemesi esastır.

Kaçak doğal gaz kullanıldığının tespit edilmesi halinde, dağıtım şirketi tarafından fotoğraf, video ve benzeri uygun kayıt araçlarıyla görüntü alınarak tutanak düzenlenir ve arşivlenir. Dağıtım şirketi tarafından kaçak kullanımın engellenmesi için gereken önlemler alınır.

Kaçak doğal gaz kullanımının tespiti halinde, ölçüm ve kontrol sonuçlarına göre düzenlenen belgelere dayanılarak hesaplanmak suretiyle kullanım süresi ve bu süre içerisinde tüketilen doğal gaz miktarı dikkate alınarak dağıtım şirketi tarafından bu fiili işleyene veya yararlanana tahakkuk ettirilecek bedel içerisine, sebep olunan zarar ve ziyan, hesaplama ile elde edilen doğal gaz miktarı karşılığı bedel ve hesaplanan bu miktarın 2 (iki) katı karşılığı kaçak kullanım bedeli yansıtılır. Kaçak kullanımın aynı tüketici tarafından iki yıl içerisinde tekrarı halinde her bir tekrarda kaçak kullanım bedeli katsayısı bir öncekinin 2 (iki) katı olarak uygulanır.

Usulsüz doğal gaz kullanımı

Madde 53 — (Değişik:RG-9/6/2017- 30091)  

Müşterinin;

a) Dağıtım şirketinin yazılı onayı olmaksızın doğal gaz kullanması,

b) Dağıtım şirketinin yazılı onayı olmaksızın başka bir bağımsız bölüme sayaç üzerinden doğal gaz bağlantısı yapması,

c) Kendi adına sözleşme yapmadan daha önce aynı adresteki müşteri adına doğal gaz kullanması,

d) İç tesisatta onaysız tadilat yaparak doğal gaz kullanması,

hallerinde dağıtım şirketi tarafından usulsüz doğal gaz kullanım işlemi yapılır ve müşterinin doğal gazı kesilir.

Ancak, birinci fıkranın (c) bendindeki hallerde, usulsüz doğal gaz kullanımı tespitinden önce dağıtım şirketine başvuruda bulunulmuş olması ve bunun belgelenmesi durumunda, usulsüz doğal gaz kullanımına ilişkin yaptırım hükümleri uygulanmaz. (Ek cümleler:RG-14/5/2022-31835) Ayrıca, sözleşme sahibinin her türlü hukuki ve mali sorumluluğu üstlendiğine dair dağıtım şirketine yazılı bir taahhütname vermesi kaydıyla aynı adreste yaşayan birinci dereceye kadar alt soy ve üst soy ile eş için kendi adına sözleşme yapmadan yapılan kullanımlar usulsüz kullanım sayılmaz. Bu durumlarda fiili kullanıcının bilgileri dağıtım şirketi tarafından kayıt altına alınarak sistemlerinde gerekli güncellemeler yapılır.

Usulsüz doğal gaz kullanımının tespiti halinde dağıtım şirketi tarafından tutanak düzenlenir ve gerekli müdahale yapılır. Doğal gazın kesilmesine neden olan usulsüzlüğün ortadan kalkması halinde, dağıtım şirketi tarafından bu Yönetmeliğin 45 inci maddesi hükümlerine göre işlem yapılır.

(Değişik fıkra:RG-14/5/2022-31835) Birinci fıkranın (d) bendindeki hallerde, onaysız yapılan tadilat neticesinde tesisata ilave cihaz eklenmesi ile tüm yakıcı cihazların toplam kapasitesinin kullanılan sayacın ölçüm aralığını aşması halinde durumun tüketiciye bildirilmesi kaydıyla, yapılan tadilat tarihinden itibaren tüm tüketim faturaları kullanılan tüm yakıcı cihazların toplam kapasitesi esas alınarak bulunan yeni değer ile adreste bulunan sayacın azami ölçüm kapasitesi arasındaki farka göre tahakkuk ettirilir. Tadilat tarihinin üzerinden 1 (bir) yıldan çok süre geçmesi halinde son 1 (bir) yıllık süre üzerinden işlem yapılır.

(Ek fıkra:RG-14/5/2022-31835) Usulsüz kullanım tespiti durumunda fiili kullanıcıya Kurul tarafından belirlenen usulsüz kullanım bedeli yansıtılır.

Kaçak ve usulsüz doğal gaz kullanımına ilişkin ortak hükümler

Madde 54- (Değişik:RG-14/5/2022-31835)

Kaçak ve usulsüz doğal gaz kullanımına ilişkin olarak;

a) Tespit,

b) Süre,

c) Tüketim miktarı hesaplama,

d) Tahakkuk,

e) Ödeme,

yöntemleri ile diğer usul ve esaslar Kurul tarafından belirlenir.

 

ÜÇÜNCÜ KISIM

İşletme ve Hizmet Yükümlülükleri

 

BİRİNCİ BÖLÜM

Dağıtım Şirketinin Uyacağı Usul ve Esaslar, Genişletme Yatırımları,

Bakım ve Onarım, Kokulandırma ve Kaçak Tespiti

Dağıtım şirketinin uyacağı usul ve esaslar

Madde 55- Dağıtım şirketi;

a) (Değişik:RG-06/08/2004-25545) Lisans aldığı tarihten itibaren en geç on sekiz ay içinde ISO 9001 kalite sistemi, ISO 14001 çevre yönetim sistemi ve OHSAS 18001 iş sağlığı ve iş güvenliği değerlendirme serileri sistemini kurarak işler hale getirir,

b) (Değişik:RG-14/5/2022-31835) Sorumluluk alanında talebe uygun kapasiteyi sağlar, değişen doğal gaz talebine ve şehrin imar planlarının gerektirdiği nüfus yoğunluğuna göre mevcut şebekeyi genişletir, iyileştirir veya yeni şebeke yatırımı planlanmasını yapar ve uygular, yıllık yatırım planlamalarını ilgili yılın ilk çeyreği sonuna kadar hazırlar ve talep edilmesi halinde yatırım planlamaları hakkında doğru bilgilendirme yapar.

c) (Değişik:RG-14/5/2022-31835) Yerel itfaiye ve güvenlik kuruluşlarını doğal gaz ve uygulamaları konusunda eğitir ve bunlarla uyum içinde çalışır, talep halinde söz konusu kuruluşların tatbikatlarına katılır.

d) Müşteri başvuru ve şikayetlerini kabul edip, en kısa sürede sonuçlandırmak amacıyla müşteri hizmetleri servisini kurar,

e) (Mülga ibare:RG-06/08/2004-25545)(…) Şebekeyle ilgili halihazır projelerin imar planlarına, kadastro paftalarına işlenmesini sağlar,

f) Doğal gazın müşterinin talebi doğrultusunda, uygun basınçla müşteriye teslimini sağlar,

g)  Müşterilere şeffaf, eşit ve tarafsız hizmet verir,

h)Yasal zorunluluk veya müşterinin yazılı muvafakat vermesi hali dışında, müşteri bilgilerini gizli tutar ve bu bilgileri üçüncü kişilere açıklayamaz.

i) (Değişik:RG-14/5/2022-31835) Müşterilerini belirli bir marka ya da şirkete yönlendiremez, rekabeti bozucu uygulamalar yapamaz.

k) Müşterilerinin bilinçlendirilmesine yönelik olarak yazılı ve görsel yayın araçları kullanarak gerekli çalışmaları yapar ve doğal gazın etkin şekilde kullanımına ilişkin, emniyet ve diğer konularda müşteriyi bilgilendirir,

l) Müşteri taleplerindeki dalgalanmaları karşılamak için doğal gaz teslimi programlamasını yapar, talep dengesizlikleri veya işletmeyle ilgili aksamalar durumunda, hizmetin devamlılığını sağlar,

m)  Hizmet kesintileri, doğal gaz kaçakları ve güvenlik ile ilgili konularda gerekli önlemleri alır,

n) Doğal Gaz Piyasası Sertifika Yönetmeliği hükümleri doğrultusunda, iç tesisat ve servis hatları sertifikası verir.

o) (Değişik:RG-14/5/2022-31835) Dağıtım bölgesinde müşterisi olan tedarikçilere iletim şebekesi üzerinden verilen hizmetler ve iletim şebekesinin işletimi için gerekli olan verileri, iletim şirketinin talebi ve Kurumun onayı ile belirlenen zaman aralıklarında ve kapsamda vermekle yükümlüdür.

p) (Ek:RG-14/5/2022-31835) Kurum tarafından talep edildiği takdirde veya gerekli görülen hallerde bu Yönetmelik kapsamındaki hizmetleri elektronik ortamda ve e-Devlet üzerinden sunar.

r) (Ek:RG-14/5/2022-31835) Dağıtım şebekesine ilişkin deplase işlemleri sebebiyle oluşan maliyetlerin gerektiğinde tarife hesaplamalarında dikkate alınmasına ilişkin kriterler Kurul tarafından belirlenir.

s) (Ek:RG-14/5/2022-31835) (Değişik:RG-21/2/2026-33175) Çağrı hizmetleri hariç acil müdahale hizmetleri için hizmet alamaz. Bunun haricinde hizmet alınamayacak diğer hususlar Kurul tarafından belirlenir.

ş) (Ek:RG-21/2/2026-33175) Dağıtım bölgesi içerisinde, dağıtım faaliyetini eksiksiz ve kesintisiz bir şekilde yürütebilecek nitelikte, dağıtım bölgesinin ihtiyacıyla orantılı şekilde en az 1 (bir) adet işletme binası kurar.

t) (Ek:RG-21/2/2026-33175) Faaliyetlerine ilişkin bilgi ve belgelerin muhafazasını sağlamak amacıyla arşiv kayıtlarını dijital ortama aktarır, bu sistemin yedekliliğini ve sürekliliğini temin eder, acil ve afet durumlarında erişilebilirliğini sağlar.

u) (Ek:RG-21/2/2026-33175) Dağıtım faaliyetinin eksiksiz ve kesintisiz bir şekilde yürütülmesine ilişkin gerekli her türlü verisini, lisans bazında münferit olarak diğer şirketlerin verilerinden fiziksel altyapı ve/veya sanal sistem düzeyinde ayrıştırılmış şekilde tutar, yönetir ve bu verilerin erişimini sınırlandırır.

Genişletme yatırımları

Madde 56-Dağıtım şirketi, yıllık talep tahminleri, imara uygun yapılaşma gerçekleşme tespitleri ve şebekenin henüz ulaşmadığı noktalardan gelen bağlantı talepleri doğrultusunda şebeke genişletme fizibilitelerini yaparak şebeke genişletme yatırımlarını ilgili mevzuatta belirtilen usul ve esaslara göre projelendirir ve  yatırımını gerçekleştirir. Dağıtım şirketi  sorumluluk alanındaki talebe uygun kapasitenin yeterliliğini sağlamakla yükümlüdür. Ayrıca şebekenin bulunduğu mahallerde kat artışına yönelik imar değişikliği yapılmış ise bu değişikliğe uygun olarak şebeke kapasite artışı için de gerekli önlemleri alır.

Bakım ve onarım faaliyetleri

Madde 57- Dağıtım şirketi;                  

a) Dağıtım şebekesinin hizmet kabiliyetinin üst düzeyde tutulması ve sürdürülmesi için gerekli tüm tedbirleri alır. Elli bin aboneye kadar en az iki adet ve ilave her elli bin  abone için bir araç hesabına göre tam teşekküllü ve hizmete hazır bakım - onarım aracı bulundurur,

b) Bakım ve onarım faaliyetleri esnasında ortamı doğal gazdan arındırır, ilgili mevzuat ve standartlara göre gereken tedbirleri alarak güvenliği sağlar,

c) Dağıtım şebekesinin fiziki ve teknik özelliklerini, üretici firmaların tavsiyelerini ve ilgili mevzuat ve standartları dikkate alarak tamir ve bakım kurallarını hazırlar ve ilgili tüm birimlerinde bulundurur,

d) (Değişik:RG-14/5/2022-31835) Yıllık ve beş yıllık bakım programları oluşturarak periyodik bakım ve yedek parça stokunu planlar. Bu planlara uygun bakımları yaparak raporlarını tutar ve talep halinde Kuruma verir,

e)  Üretici firmaların tavsiyelerini de göz önünde bulundurarak inşaat, bakım, onarım ve acil müdahale için yeterli düzeyde yedek parça ile tamir malzemeleri bulundurur.

f) (Ek:RG-14/5/2022-31835) Tüketicilere güvenli ve kesintisiz gaz arzının sağlanmasını teminen, dağıtım şebekesinin ve şebeke işletmeciliğinde kullanılan ekipmanların yerinde fiziki kontrollerini ve bakım onarımını ilgili mevzuat, standartlar ve üretici firma tavsiyelerine uygun olarak dağıtım bölgesinin özelliklerine göre planlar ve uygular.

g) (Ek:RG-14/5/2022-31835) Dağıtım şebekesinde oluşan büyük çapta hasar ve gaz kesintilerinde, dağıtım şirketi şebeke içerisinde gerekli doğal gaz akışları ile alakalı operasyonları yapar ve alternatif gaz arzı imkânlarını da değerlendirerek iletim şirketi ve Kuruma bilgi verir.

Bakım ve onarımda doğal gaz kesintisi

Madde 58- Doğal gaz şebekesinin genişletilmesi, yenilenmesi, iyileştirilmesi ve onarımı gibi nedenlerle önceden bilinen doğal gaz kesintileri için dağıtım şirketi, alınması gereken önlemleri, kesinti süresini ve tekrar doğal gaz verilecek zamanı mahalli veya diğer yayın araçları ile müşterilere en az üç gün önceden haber vermek suretiyle doğal gaz arzını durdurabilir. Dağıtım şirketi bu tip bakım ve onarımı en kısa sürede tamamlar.

Ayrıca, müşterinin iç tesisatındaki arıza nedeniyle de doğal gaz kesilebilir. Dağıtım şirketi tarafından acil durumlar dışında önceden haber verilmeden yapılacak doğal gaz kesintisi sonucu oluşacak zarar ve ziyandan dağıtım şirketi sorumludur.

Kokulandırma

Madde 59- Dağıtım şirketi, doğal gaz kaçaklarının fark edilebilmesini sağlamak amacıyla doğal gazı kokulandırır. Kokulandırma, ilgili mevzuat ve standartlar doğrultusunda yapılır ve en az ayda bir kez test edilir.

Kaçak tespiti ve kontrolü

Madde 60- (Değişik fıkra:RG-14/5/2022-31835) Dağıtım şirketi, güvenlik açısından olası kaçakların tespiti ve bunun için gerekli tedbirlerin alınması amacıyla asgari yılda iki defa olmak üzere kaçak kontrolü yapar ve sonuçlarını kayıt altına alır. Kaçak tarama sonucunda gereği halinde şebekeye müdahale edilir.

Kaçak kontrolleri, özel olarak yakınından alçak basınçlı dağıtım hattı geçen altyapı, demiryolu, kanal, kanalet, altyapı tesis kesişmeleri gibi özel geçiş noktaları da dahil, şebekenin tamamında uygun doğal gaz dedektörleri kullanılarak yapılır. Söz konusu kontrollerde uygun ölçekli haritalar ile halihazır projeler kullanılır ve kaçak kontrol kayıtları bu projelerdeki gösterimler dikkate alınarak yapılır.

Dağıtım şirketi doğal gaz kaçağının giderilmesi için altı saatten fazla çalışma gerekiyorsa hastane ve okul gibi kamu hizmeti veren müşterilerin doğal gaz ihtiyaçlarını karşılamak için gerekli tedbirleri alır.

 

İKİNCİ BÖLÜM

Acil Müdahale, Kayıt ve Dokümantasyon

Acil müdahale

Madde 61-  (Değişik birinci fıkra:RG-21/2/2026-33175) Dağıtım şirketi, arızalara, şebeke özelliklerini dikkate alarak zamanında müdahale ve etkin bir çözüm sağlayacak acil müdahale organizasyonunu kurmak zorundadır. Oluşturulan acil müdahale merkezinde, acil ihbar için özel servis numarasını arayan kişiye, en geç üçüncü çalışta otomatik santral olmadan cevap verebilecek yeterli sayıda telefon hattı bulundurulur veya acil ihbarların karşılanmasına imkân sağlayan uygun teknolojik sistemler kurulur. Ayrıca, söz konusu merkezde yeterli sayıda tam teşekküllü acil müdahale aracı ile yeterli sayıda eğitimli dağıtım şirketi personeli bulundurulur.

Dağıtım şirketi, doğal gazla ilgili her türlü tesis ve cihazların üzerine doğal gaz acil özel servis telefon numarasını da içeren ikaz ve işaret levhaları yerleştirir.

(Değişik fıkra:RG-14/5/2022-31835) Dağıtım şirketi, ihbarları kayıt edecek personeli ve kullanılacak acil müdahale araçlarından en az birini personeli ile birlikte yirmi dört saat hazır durumda tutar. Acil müdahale gerektiren ihbarlara, abone sayısı beş binin altında olan ve şehir merkezi ile en yakın işletme merkezine karayolu mesafesi on beş km üstünde olan genişleme yoluyla dağıtım bölgesine dahil edilen yerleşim yerleri için en geç 30 (otuz) dakika içinde, dağıtım bölgesindeki diğer yerleşim yerleri için ise en geç 15 (on beş) dakika içinde ulaşacak organizasyonu yapar. Arıza sayısı ve sıklığına bağlı olarak yeterli sayıda bakım-onarım personelinin iş başında olmasını sağlar.

(Değişik fıkra:RG-14/5/2022-31835) Dağıtım şirketi, acil müdahale personelini dağıtım şebekesine ilişkin asgari olarak arıza ve hasar tespiti ile onarımı, alet, cihaz ve ekipmanların kullanımı, iş emniyeti tedbirleri, tespit edilemeyen veya giderilemeyen arıza ve hasar hallerinde uygulanacak usuller konusunda eğitir veya eğitim almasını sağlar. Bu konularda mesleki yeterlilik belgesi olmayan personel, acil müdahale faaliyetlerinde çalıştırılamaz.

(Değişik fıkra:RG-14/5/2022-31835) Acil müdahale merkezi; ihbarda bulunan kişileri, ihbar konusu olay karşısında nasıl davranacakları ve acil müdahale ekibinin kaç dakika içinde olay yerine ulaşabileceği gibi hususlarda bilgilendirir. Gerektiğinde güvenlik, itfaiye, acil sağlık merkezleri ve ilgili lisans sahibi ve/veya kuruluşlar ile bağlantı kurar.

Dağıtım şirketi, doğal gaz ihbarlarına ilişkin kayıtlarında asgari olarak aşağıdaki hususlara yer verir ve kayıtları muhafaza eder;

a) İhbarı yapan kişinin adı, ihbarın yapıldığı tarih ve saat,

b) İhbar konusu arızanın olduğu adres,

c) İhbarı kaydeden personel ile ihbara müdahale eden ekibin isim ve görevleri,

d) İhbar sahibine yapılan bilgilendirme ile alınan tedbir ve yapılan uygulama.

Müşteriler, acil durumlarda, acil müdahale merkezine bilgi verir ve yardım ister. Müşteriler, doğal gaz kaçak ve kazalarına karşı alınacak önlemlere ilişkin ilgili mevzuata ve dağıtım şirketinin kurallarına uyar.

(Değişik fıkra:RG-14/5/2022-31835) Acil müdahale hizmetleri ücretsiz verilir. Ancak, dağıtım şebekesine üçüncü şahıslar veya diğer altyapı kuruluşları tarafından hasar verilmesi durumunda, meydana gelen zarar, hasar veren tarafından karşılanır. Bununla birlikte, acil müdahale sonucunda iç tesisatta yapılacak tamir ve tadilat müşterinin sorumluluğundadır.

(Ek fıkra:RG-21/2/2026-33175) Afet ve acil durumlarda, dağıtım şirketleri diğer dağıtım şirketlerine personel, araç, malzeme ve ekipman desteği verebilir.

Doğal gaz acil eylem planı

Madde 62- Dağıtım şirketi, olağanüstü durumlarda izlenecek yöntemleri içeren Doğal Gaz Acil Eylem Planı hazırlar. Plan asgari olarak; 

a) Dağıtım şirketi yönetiminin bilgilendirilmesi,

b) Yerel makamların bilgilendirilmesi,

c) Kriz yönetim merkezinin oluşturulması,

d) Acil eylem planı organizasyonu,

e) Acil eylem planı uygulama prosedürü,

f) Müşterilerin, personelin ve halkın bilgilendirilmesi,

g) Müdahalenin programlanması ve uygulanması,

h) Sistem emniyetinin temin edilmesi,

i) Sistemin tekrar devreye alınması,

hususlarını içerir.

Acil durumda doğal gaz kesintisi

Madde 63- Dağıtım şirketi; sadece, doğal gaz kaçağı, güvenliğin ciddi bir risk altında olması ile doğal gazın kalitesi, basıncı ve diğer özelliklerinin can ve mal güvenliği açısından tehlikeye neden olması durumlarında doğal gazı kesebilir.

Doğal gaz alt yapı bilgi sistemi

Madde 64- Doğal gaz alt yapı bilgi sistemi; dağıtım şebekesi ile ilgili her türlü bilginin, bir bilgisayar programı yardımıyla, bilgisayar ortamına kayıt edilmesiyle oluşturulan  ve istenildiğinde bu bilgiler ile ilgili her türlü sorgulamanın tek tek veya birlikte yapılabildiği sistemdir. Dağıtım şirketi, şebeke genişletmesi için gerekli mühendislik ve projelendirme çalışmaları esnasında haritaları güncelleyerek yapılan ölçümleri ulusal koordinat sistemine uyumlu olarak bilgisayar ortamında sayısallaştırır. Uygulama sonrası, şebekeye ait halihazır proje ve bilgiler dağıtım şirketinin kuracağı doğal gaz alt yapı bilgi sistemine kayıt edilir. Doğal gaz alt yapı bilgi sisteminde dağıtım şebekesi ile ilgili bilgiler değiştikçe ve yenilendikçe güncellenerek en az üç ayda bir yedeklemesi yapılır ve saklanır.

 

ÜÇÜNCÜ BÖLÜM

Sevkiyat Kontrol Merkezi, Haberleşme Sistemleri, Akış Kontrolü,

Kalibrasyon ve Ayarlar, Eğitim ve İş Güvenliği

Sevkiyat kontrol merkezi

Madde 65- Sevkiyat kontrol merkezi, yapılan ölçümleri uzaktan algılayıp kaydedecek ve bu kayıtları çözümleyecek, tüketimdeki sıra dışı düşüş ya da yükselişleri ve sayaçlara yapılabilecek müdahaleler ile saha incelemesi yapılması gereken yerleri tespit edecek donanım ve yazılımları içerir. Aynı zamanda şehir şebeke planına göre kritik kabul edilen noktalara uzaktan kumanda etme imkanı verecek şekilde tasarlanır.

Dağıtım şirketi, sevkiyat kontrol merkezinin verilerine bağlı olarak ortaya çıkan mevsimsel değişikliklere göre doğal gaz programlamasını yapar ve sistem dengelemesini sağlar.

Haberleşme sistemleri

Madde 66- (Değişik:RG-14/5/2022-31835)  

Tüketim miktarı Kurul tarafından belirlenen miktarın üzerinde olan serbest tüketiciler, tedarikçi seçme hakkını kullanan serbest tüketiciler ve Kurul tarafından belirlenecek diğer serbest tüketiciler dağıtım şirketinin bildirim tarihinden itibaren en geç 30 (otuz) gün içerisinde sevkiyat kontrol merkezi ile haberleşme sistemlerini dağıtım şirketinin belirlediği kriterler çerçevesinde bedeli kendilerine ait olmak üzere tesis eder. Serbest tüketicinin haberleşme sistemini bildirim tarihinden itibaren 30 (otuz) gün içerisinde tesis etmemesi halinde haberleşme sistemi dağıtım şirketi tarafından tesis edilerek serbest tüketiciye fatura edilir. Serbest tüketicilerin diğer mevzuata göre ekonomik ömrünü doldurmuş otomatik hacim düzelticileri ve haberleşme imkânı sağlayacak sistemleri ile ilgili olarak bu maddedeki usul ile yenileme yapılır. Tesis edilen bu sistemlerin işletimi, ilgili standartlara uygunluğu ve siber güvenlik yükümlülükleri dağıtım şirketinin sorumluluğunda olup tüm bakım, onarım, haberleşme ve işletme masrafları dağıtım şirketi tarafından karşılanır.

Akış kontrolü

Madde 67- (Değişik fıkra:RG-14/5/2022-31835) Dağıtım şirketi, dengeli ve emniyetli doğal gaz akışının temini için boru hatlarında, şehir içi bölge istasyonlarında ve vanalarda en fazla on beş günlük periyotlarda basınç kontrolleri yapar ve bu kontrollere ilişkin raporları muhafaza eder.

 Dağıtım şirketi, sevkiyat kontrol merkezi bulunan şebekelerde periyodik kontrolleri ve merkezde acil durumlarda sisteme müdahaleye imkan verecek düzenlemeleri yapar.

Kalibrasyon ve ayarlar

Madde 68-  (Değişik:RG-14/5/2022-31835)

Dağıtım şirketi, sayaçların muayenesi ile tamir ve ayar işlemlerini, Ölçü Aletleri Mevzuatına göre yapar veya yaptırır. Sayaçların mevzuatta belirtilen periyotlara ve üretici firmaların tavsiyelerine uygun olarak kalibrasyonunu yapar, rapor tutar ve muhafaza eder. Doğal gaz dedektörlerinin, üretici firmaların tavsiyelerine uygun periyotlarda kalibrasyonunun yapılmasını sağlar. Ayrıca ölçüm sisteminde kullanılmakta olan diğer ekipmanın kalibrasyonu da ilgili mevzuat, standartlar, eğer ilgili mevzuat ve standart yok ise üretici tavsiyelerine göre yapılır.

Eğitim ve iş güvenliği

Madde 69- Dağıtım şirketi, dağıtım şebekesinde görevlendirilecek personelin  mesleki eğitimini yaptırmak, hassas bölgelerde uzman personel görevlendirmek, her yıl en az iki kez olmak üzere ve personelin çalışma koşullarına göre hizmet içi periyodik eğitim programları düzenlemek ve iş güvenliğini sağlamakla yükümlüdür.  

 

DÖRDÜNCÜ BÖLÜM

Genel Hükümler

Dağıtım bölgelerinin genişletilmesi (1)

Madde 70 — (Ek:RG-24/09/2005-25946) (Değişik:RG-18/11/2016-29892)

Dağıtım şirketlerinin lisanslarında belirtilen şehirlerde belediye ve mücavir alan sınırlarını kapsayan dağıtım bölgesi, teknik ve ekonomik gerekler dikkate alınarak, il sınırlarını aşmayacak şekilde;

a) Dağıtım bölgesinin genişletilebilmesi için ilgili dağıtım lisansı sahibi şirketin yazılı talebinin olması,

b) Dağıtım lisansı sahibi şirketin mevcut dağıtım bölgesinde uygulanan/uygulanacak tarife yöntemlerinin genişlemeye konu bölgede aynen geçerli olacağı şartının ilgili dağıtım şirketince kabul edilmesi,

c) Genişlemeye konu bölgede belediyelerin olması halinde belediye meclis karar/kararlarının olumlu olması,

kaydıyla dağıtım bölgesi Kurul tarafından uygun bulunması halinde ihale edilmeksizin genişletilir ve bu genişlemeye ilişkin lisans tadil işlemleri yapılır.

Dağıtım şirketlerinin lisanslarında belirtilen şehirlerin belediye ve mücavir alan sınırları içerisinde ihale tarihinden sonra imarlı hale gelen alanlar, dağıtım bölgesinin kapsamındadır. Doğal gaz dağıtım şirketleri, lisanslarında belirtilen dağıtım bölgesi kapsamında doğal gaz dağıtım faaliyeti yapmakla yetkili olup, dağıtım bölgesi kapsamında bulunan şehirlerin imarlı alanlar bütününde dağıtım faaliyeti yapmakla yükümlüdür.

(Değişik fıkra:RG-9/6/2017- 30091) Dağıtım bölgesine ilave edilecek şehirlerde dağıtım şirketinin başvuru sırasında ayrıca bir talebi olmaması halinde, lisans tadil tarihinden itibaren yatırıma başlama süresi en geç 6 ay, ilk gaz verme süresi en geç 18 ay, imarlı alanlar bütünündeki yatırımları tamamlama süresi ise en geç 5 yıl olarak belirlenir. Dağıtım şirketinin belirtilen sürelerden farklı talebi var ise, talep ettiği süreleri her bir şehir için ayrı ayrı olmak üzere genişleme başvurusu sırasında belirtir. Dağıtım şirketinin talep ettiği süreler, bu fıkrada belirtilen sürelerden az olmamak üzere Kurul tarafından aynen veya değiştirilerek onaylanır. İlgili şehirlere ilişkin süreler, genişlemeye ilişkin Kurul Kararında belirtilir.Bir lisanslı dağıtım şirketinin dağıtım bölgesinin, doğal gaz piyasası haricindeki mevzuattan kaynaklanan nedenlerle, başka bir lisanslı dağıtım şirketinin dağıtım bölgesinin içinde kalması durumunda, söz konusu diğer mevzuatlardan kaynaklanan değişikliğe dair ilk yapılan düzenlemede belirlenen sınırlar esas alınır.

Dağıtım bölgelerinin yukarıda sayılan nedenlerden herhangi biriyle genişlemesi durumunda, Kurul, genişlemeye konu bölge için öngörülen şebeke yatırım tutarı ve genişlemeye konu bölgede yapılacak yatırımları da dikkate alarak tarifeleri yeniden belirleyebilir.

Genişletilecek dağıtım bölgesinde yer alan dağıtım ve/veya bağlantı hatları, yatırımının tüketiciler tarafından karşılanan kısmı bilâbedel, lisans sahipleri tarafından karşılanan kısmı ise bedeli mukabili dağıtım şirketine devredilir.

Genişlemelere ilişkin teminat mektubu alınmaz.

Aynı il sınırı içerisinde farklı dağıtım şirketlerinin dağıtım faaliyeti yapması durumunda, aynı il sınırları içerisindeki diğer dağıtım şirketlerinin de genişlemeye ilişkin taleplerinin olup olmadığı sorulur. Genişlemeye ilişkin değerlendirme, lisansına konu dağıtım bölgesinin tamamındaki toplam abone sayısı daha fazla olan talep sahibi dağıtım şirketi önceliğine göre yapılır.

Dağıtım bölgesi kapsamında olmayan bir şehrin bulunduğu il sınırı içerisinde faaliyet gösteren dağıtım şirketlerinin ilgili şehir için dağıtım bölgesi genişletme talebi olmaması durumunda, Kurul tarafından uygun görülmesi halinde ilgili şehir için dağıtım lisansı ihalesi yapılabilir.

(Ek fıkra:RG-14/5/2022-31835) 4646 sayılı Kanunun 4 üncü maddesi uyarınca doğal gaz dağıtım şirketlerinin dağıtım bölgelerine ilave edilecek yeni genişleme bölgelerinde yerleşim yeri belediyesince doğal gaz dağıtım şirketine yatırım yapılması talebinde bulunulması halinde; ilgili dağıtım şirketinden teminat, kontrollük hizmet bedeli, kaplama bedeli, zemin/alan tahrip bedeli, hafriyat döküm bedeli ve benzeri adlarla herhangi bir bedel alınmaz ve altyapı kazı alanının üst kaplamaları ilgili belediye tarafından bedelsiz olarak yapılır.

(Ek fıkra:RG-21/2/2026-33175) Doğal gaz dağıtım bölgesi dışında kalan ve doğrudan iletim hattına bağlı serbest tüketicilere gaz arzı sağlayan ilgili tesisler için;

a) İl sınırları içerisinde faaliyette bulunan dağıtım şirketi/şirketlerinin söz konusu il sınırları içerisindeki tüm tesisleri devir alma şartı ile talepte bulunması,

b) İletim şirketinin muvafakat vermesi,

c) Dağıtım şirketi tarafından dağıtım bölgesinde mevcutta uygulanan/uygulanacak tarife yöntemlerinin aynen geçerli olacağı şartının kabul edilmesi,

ç) Kurulun teknik ve ekonomik olarak talebi uygun bulması,

hâlinde doğal gaz dağıtım bölgesi kapsamına alınarak lisans tadili yapılır. Bu tesislerin mülkiyet ve işletmesi, yatırımın serbest tüketici tarafından karşılanan kısmı bilabedel, iletim şirketi tarafından karşılanan kısmı ise bedeli mukabilinde dağıtım şirketine devredilir ve dağıtım şebekesi olarak kabul edilir.

(Ek fıkra:RG-21/2/2026-33175) Aynı il sınırı içerisinde farklı dağıtım şirketlerinin dağıtım faaliyeti yapması durumunda, diğer dağıtım şirketlerinin de başvuruya konu tesislerin devrine ilişkin taleplerinin olup olmadığı sorulur. Başka bir talep olması halinde devre ilişkin değerlendirme, devre konu tesislere en yakın şebekesi olan dağıtım şirketine öncelik verilerek yapılır.

Yönetmelik hükümlerinin uygulanması

Madde 71-  Dağıtım şirketi, bu Yönetmelikte düzenlenmeyen hususlarda, ilgili mevzuata aykırı olmamak kaydıyla, vereceği dağıtım hizmetine ilişkin olarak Kurumun onayını alarak müşterilere yönelik açıklayıcı duyuru mahiyetinde sirküler yayımlayabilir.

Yönetmelikte hüküm bulunmayan haller

Madde 72- Bu Yönetmelikte hüküm bulunmayan hallerde Kurulun konuya ilişkin kararı çerçevesinde işlem yapılır.

Geçici ve Son Hükümler

Geçici madde 1- 4646 sayılı Kanunun yürürlüğe girdiği tarihten evvel alınmış bir hak, belge, izin ve yetkilendirmeye müsteniden doğal gaz dağıtım faaliyetinde bulunan şehir içi dağıtım tüzel kişileri, mevcut durum ve uygulamalarını 31/12/2002 tarihine kadar bu Yönetmeliğin ikinci ve üçüncü kısımlarında yer alan hükümlere uygun hale getirir. Kurul, gerektiği takdirde bu süreyi en fazla dört ay daha uzatabilir. (Ek son cümle:RG-02/05/2003-25096) Ancak sayaçların temini ve bağlantıya ilişkin mevcut uygulamalar 31/12/2003 tarihine kadar devam eder.

Geçici madde 2- Doğal gaz altyapı bilgi sistemi ve/veya ISO 9001 kalite yönetim sistemi ve/veya ISO 14001 çevre yönetim sistemi bulunmayan mevcut şehir içi dağıtım tüzel kişileri, lisans aldıkları tarihten itibaren en geç on sekiz ay içinde bu sistemleri kurarak işletmekle yükümlüdür.

Dağıtım şirketleri, bu maddeyi ihdas eden Yönetmelik hükümleri uyarınca altyapılarında ve/veya sistemlerinde yapılması gereken işlemleri bu maddenin yürürlüğe girdiği tarihten itibaren 6 (altı) ay içerisinde tamamlamakla yükümlüdür.

Geçici Madde 12- (Ek:RG-21/2/2026-33175)

Bu Yönetmeliğin 55 inci maddesinin birinci fıkrasının (ş), (t) ve (u) bentlerindeki yükümlülükler dağıtım şirketlerince yirmi dört ay içerisinde tamamlanır.

Yürürlük

Madde 73- Bu Yönetmelik yayımı tarihinden geçerli olmak üzere yürürlüğe girer.

Yürütme

Madde 74-  Bu Yönetmelik hükümlerini Başkan yürütür.

 

______________

 

(1)  Bu madde; 24/09/2005 tarihli ve 25946 sayılı Resmi Gazete’de yayımlanan Yönetmelik ile eklenmiş ve diğer maddeler buna göre teselsül ettirilmiştir.

(2)  29/7/2018 tarihli ve 30493 sayılı Resmi Gazete’de yayımlanan değişiklik ile bu Yönetmeliğin 40 ıncı maddesine dördüncü fıkrasından sonra gelmek üzere fıkra eklenmiş ve diğer fıkra buna göre teselsül ettirilmiştir.

(3) 21/2/2026 tarihli ve 33175 sayılı Resmî Gazete’de yayımlanan değişiklik ile Yönetmeliğin 39 uncu maddesine üçüncü fıkrasından sonra gelmek üzere fıkra eklenmiş ve diğer fıkralar buna göre teselsül ettirilmiştir.
`;

        // --- API Çağrısı ---
        async function askRegulation(question) {
            if (!API_KEY) {
                return "Lütfen HTML dosyasının içindeki API_KEY değişkenine kendi Gemini API anahtarınızı ekleyin.";
            }

            const systemInstruction = `
Sen, Doğal Gaz Piyasası Mevzuatı konusunda uzman, yardımsever ve profesyonel bir danışmansın. 
Sana verilen "DOĞAL GAZ PİYASASI DAĞITIM VE MÜŞTERİ HİZMETLERİ YÖNETMELİĞİ" metnine tam hakimsin.

Yanıt Stratejin:
1. Bir uzman gibi konuş: Soruları sadece teknik bir metin okur gibi değil, konuyu bilen bir uzman gibi açıkla.
2. Mevzuata sadık kal: Verdiğin tüm bilgiler mutlaka paylaşılan metinde yer almalı. Metinde olmayan bir bilgi hakkında yorum yapma.
3. Madde referansı ver: Cevabının sonunda veya içinde ilgili Madde numarasını (örneğin: "Yönetmeliğin 36. maddesi uyarınca...") mutlaka belirt.
4. İnsansı ve nazik ol: "Tabii ki yardımcı olayım", "Mevzuata göre durum şöyledir" gibi doğal geçişler kullan.
5. Eğer cevap metinde yoksa: "Bu konu hakkında mevcut yönetmelik metninde spesifik bir hüküm bulunmamaktadır, ancak genel prosedürler için ilgili dağıtım şirketiyle görüşmenizi öneririm" şeklinde profesyonelce yanıtla.

Mevzuat Metni:
${REGULATION_TEXT}
`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        systemInstruction: {
                            parts: [{ text: systemInstruction }]
                        },
                        contents: [{
                            parts: [{ text: question }]
                        }]
                    })
                });

                const data = await response.json();
                if (data.error) {
                    console.error("API Error:", data.error);
                    return "API Hatası: " + data.error.message;
                }
                return data.candidates[0].content.parts[0].text;
            } catch (error) {
                console.error("Fetch Error:", error);
                return "Yapay zeka servisine bağlanırken bir hata oluştu. Lütfen daha sonra tekrar deneyiniz.";
            }
        }

        // --- Ana Uygulama Bileşeni ---
        function App() {
            const [messages, setMessages] = useState([
                {
                    id: '1',
                    text: 'Merhaba! Ben Doğal Gaz Mevzuat Asistanıyım. Doğal gaz dağıtım ve müşteri hizmetleri yönetmeliği hakkındaki sorularınızı yanıtlayabilirim.',
                    sender: 'bot',
                    timestamp: new Date(),
                },
            ]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

            useEffect(() => {
                scrollToBottom();
            }, [messages]);

            const handleSend = async () => {
                if (!input.trim() || isLoading) return;

                const userMessage = {
                    id: Date.now().toString(),
                    text: input,
                    sender: 'user',
                    timestamp: new Date(),
                };

                setMessages((prev) => [...prev, userMessage]);
                setInput('');
                setIsLoading(true);

                const botResponse = await askRegulation(input);

                const botMessage = {
                    id: (Date.now() + 1).toString(),
                    text: botResponse,
                    sender: 'bot',
                    timestamp: new Date(),
                };

                setMessages((prev) => [...prev, botMessage]);
                setIsLoading(false);
            };

            const suggestedQuestions = [
                "Bağlantı bedeline kaç taksit yapılır?",
                "Güvence bedeli taksitlendirilir mi?",
                "Gaz kesildikten sonra ne zaman açılır?",
                "Kaçak kullanım cezası nedir?"
            ];

            return (
                <div className="flex flex-col h-screen bg-[#F0F4F8] font-sans text-[#1A202C]">
                    {/* Header */}
                    <header className="bg-white border-b border-blue-100 px-6 py-4 flex items-center justify-between shadow-sm sticky top-0 z-10">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 p-2 rounded-lg shadow-blue-200 shadow-lg text-white">
                                <FlameIcon />
                            </div>
                            <div>
                                <h1 className="text-xl font-bold text-blue-900 tracking-tight">Doğal Gaz Mevzuat Danışmanı</h1>
                                <p className="text-[10px] text-blue-500 font-bold uppercase tracking-widest">Uzman Mevzuat Asistanı</p>
                            </div>
                        </div>
                    </header>

                    {/* Main Chat Area */}
                    <main className="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6 max-w-4xl mx-auto w-full scrollbar-thin scrollbar-thumb-blue-200">
                        {messages.map((msg) => (
                            <div
                                key={msg.id}
                                className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in`}
                                style={{ animation: 'fadeIn 0.3s ease-out' }}
                            >
                                <div className={`flex gap-3 max-w-[85%] sm:max-w-[80%] ${msg.sender === 'user' ? 'flex-row-reverse' : ''}`}>
                                    <div className={`w-9 h-9 rounded-xl flex items-center justify-center shrink-0 shadow-sm ${
                                        msg.sender === 'bot' ? 'bg-blue-600 text-white' : 'bg-white text-blue-600 border border-blue-100'
                                    }`}>
                                        {msg.sender === 'bot' ? <BotIcon /> : <UserIcon />}
                                    </div>
                                    <div className={`p-4 rounded-2xl shadow-md ${
                                        msg.sender === 'bot' 
                                            ? 'bg-white border border-blue-50 text-gray-800 rounded-tl-none' 
                                            : 'bg-blue-600 text-white rounded-tr-none'
                                    }`}>
                                        <p className="text-sm sm:text-[15px] leading-relaxed whitespace-pre-wrap font-medium">{msg.text}</p>
                                        <span className={`text-[10px] mt-2 block opacity-50 font-bold ${msg.sender === 'user' ? 'text-right' : ''}`}>
                                            {msg.timestamp.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        ))}
                        
                        {isLoading && (
                            <div className="flex justify-start">
                                <div className="flex gap-3">
                                    <div className="w-9 h-9 rounded-xl bg-blue-600 text-white flex items-center justify-center animate-pulse shadow-md">
                                        <BotIcon />
                                    </div>
                                    <div className="bg-white border border-blue-50 p-4 rounded-2xl rounded-tl-none shadow-md flex gap-1.5 items-center">
                                        <span className="w-2 h-2 bg-blue-200 rounded-full animate-bounce" style={{ animationDelay: '0ms' }}></span>
                                        <span className="w-2 h-2 bg-blue-400 rounded-full animate-bounce" style={{ animationDelay: '150ms' }}></span>
                                        <span className="w-2 h-2 bg-blue-600 rounded-full animate-bounce" style={{ animationDelay: '300ms' }}></span>
                                    </div>
                                </div>
                            </div>
                        )}
                        <div ref={messagesEndRef} />
                    </main>

                    {/* Input Area */}
                    <footer className="bg-white border-t border-blue-50 p-4 sm:p-6 sticky bottom-0">
                        <div className="max-w-4xl mx-auto space-y-4">
                            {/* Suggestions */}
                            {messages.length < 5 && (
                                <div className="flex flex-wrap gap-2 overflow-x-auto pb-1 no-scrollbar">
                                    {suggestedQuestions.map((q, i) => (
                                        <button
                                            key={i}
                                            onClick={() => setInput(q)}
                                            className="text-xs bg-blue-50 hover:bg-blue-600 hover:text-white text-blue-700 px-4 py-2 rounded-full border border-blue-100 transition-all duration-200 flex items-center gap-1.5 whitespace-nowrap font-semibold shadow-sm"
                                        >
                                            {q} <ChevronRightIcon />
                                        </button>
                                    ))}
                                </div>
                            )}

                            <div className="relative flex items-center gap-3">
                                <input
                                    type="text"
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && handleSend()}
                                    placeholder="Mevzuat hakkında uzman görüşü alın..."
                                    className="flex-1 bg-gray-50 border border-gray-200 rounded-2xl px-5 py-4 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all pr-14 shadow-inner"
                                />
                                <button
                                    onClick={handleSend}
                                    disabled={!input.trim() || isLoading}
                                    className={`absolute right-2 p-3 rounded-xl transition-all duration-300 ${
                                        input.trim() && !isLoading 
                                            ? 'bg-blue-600 text-white shadow-lg shadow-blue-200 hover:bg-blue-700 hover:-translate-y-0.5' 
                                            : 'text-gray-300 bg-gray-100 cursor-not-allowed'
                                    }`}
                                >
                                    <SendIcon />
                                </button>
                            </div>
                            
                            <div className="text-center text-[11px] text-gray-400 font-semibold tracking-widest pt-1">
                                ETÜRK
                            </div>
                        </div>
                    </footer>
                    <style>
                        {`
                        @keyframes fadeIn {
                            from { opacity: 0; transform: translateY(10px) scale(0.95); }
                            to { opacity: 1; transform: translateY(0) scale(1); }
                        }
                        `}
                    </style>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
